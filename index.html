<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>埃及探險 V6 | 團隊帳務版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --egypt-red: #a53816; --egypt-blue: #4b4963; --egypt-sand: #f4ece1; }
        body { font-family: 'Noto Serif TC', serif; background-color: var(--egypt-sand); }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 25px 25px 0 0; }
        .card { border-radius: 20px; background: white; box-shadow: 0 4px 12px rgba(165, 56, 22, 0.06); border: 1px solid rgba(165, 56, 22, 0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .checked { text-decoration: line-through; opacity: 0.5; }
        .paid-badge { background: #e6f4ea; color: #1e7e34; font-size: 10px; padding: 2px 6px; border-radius: 10px; }
    </style>
</head>
<body class="pb-28">

    <header class="p-6 text-center">
        <h1 class="text-2xl font-bold text-[#a53816] tracking-widest uppercase">Ancient Egypt V6</h1>
    </header>

    <main class="px-5">
        <section id="itinerary" class="tab-content active"><div id="day-selector" class="flex overflow-x-auto gap-3 py-4"></div><div id="itinerary-list" class="space-y-4"></div></section>
        
        <section id="finance" class="tab-content">
            <div class="card p-6 mb-6 text-center border-b-4 border-[#a53816]">
                <span class="text-xs text-gray-400 uppercase tracking-widest font-bold">總團費支出 (TWD)</span>
                <div class="text-4xl font-bold text-[#a53816] mt-2" id="total-amount">0</div>
                <div class="text-[11px] text-gray-500 mt-2">每人平均：NT$ <span id="avg-amount">0</span></div>
            </div>

            <h3 class="font-bold text-[#a53816] mb-3 px-1 text-sm"><i class="fas fa-users mr-2"></i>隊員結算 (4人)</h3>
            <div class="grid grid-cols-2 gap-3 mb-6" id="member-stats">
                </div>

            <div class="card p-4 mb-6 space-y-3 bg-orange-50/30">
                <div class="grid grid-cols-2 gap-2">
                    <select id="new-exp-person" class="p-2 border rounded-lg text-sm bg-white outline-none">
                        <option value="Ting">Ting</option><option value="Luke">Luke</option>
                        <option value="Joyce">Joyce</option><option value="Soda">Soda</option>
                    </select>
                    <input type="number" id="new-exp-price" placeholder="金額" class="p-2 border rounded-lg text-sm outline-none">
                </div>
                <input type="text" id="new-exp-name" placeholder="花費項目" class="w-full p-2 border rounded-lg text-sm outline-none">
                <button onclick="addUserExpense()" class="w-full bg-[#a53816] text-white py-2 rounded-lg font-bold text-sm shadow-md active:scale-95 transition">新增帳款</button>
            </div>

            <h3 class="font-bold text-[#a53816] mb-3 px-1 text-sm"><i class="fas fa-list-ul mr-2"></i>支出明細</h3>
            <div id="expense-list" class="space-y-3"></div>
        </section>
        
        <section id="packing" class="tab-content"><div id="packing-list" class="space-y-6"></div></section>
        <section id="tips" class="tab-content"><div id="tips-content"></div></section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 h-20 glass-nav flex justify-around items-center px-4 z-50">
        <button onclick="nav('itinerary')" class="nav-item text-[#a53816] flex flex-col items-center gap-1"><i class="fas fa-calendar-alt text-xl"></i><span class="text-[10px] font-bold">行程</span></button>
        <button onclick="nav('finance')" class="nav-item text-gray-400 flex flex-col items-center gap-1"><i class="fas fa-wallet text-xl"></i><span class="text-[10px] font-bold">帳務</span></button>
        <button onclick="nav('packing')" class="nav-item text-gray-400 flex flex-col items-center gap-1"><i class="fas fa-check-square text-xl"></i><span class="text-[10px] font-bold">行李</span></button>
        <button onclick="nav('tips')" class="nav-item text-gray-400 flex flex-col items-center gap-1"><i class="fas fa-compass text-xl"></i><span class="text-[10px] font-bold">攻略</span></button>
    </nav>

    <script>
        const members = ["Ting", "Luke", "Joyce", "Soda"];
        const defaultData = {
            currentDay: "3/27",
            expenses: [
                { id: 1, person: "Ting", name: "台-上-開(來回機票)", price: 80628, paid: true },
                { id: 2, person: "Luke", name: "內陸飛機票", price: 55630, paid: true },
                { id: 3, person: "Ting", name: "埃及sim卡", price: 1017, paid: true },
                { id: 4, person: "Ting", name: "旅平不便險", price: 1664, paid: true },
                { id: 5, person: "Ting", name: "klook-三天兩夜郵輪", price: 96024, paid: true },
                { id: 6, person: "Ting", name: "klook-黑白沙漠", price: 14430, paid: true },
                { id: 7, person: "Ting", name: "Pyramisa Hotel", price: 6386, paid: true },
                { id: 8, person: "Ting", name: "Crystala Guest House", price: 3093, paid: true },
                { id: 9, person: "Ting", name: "Nebro Nubian House", price: 5196, paid: true },
                { id: 10, person: "Luke", name: "大埃及博物館門票", price: 3968, paid: true },
                { id: 11, person: "Luke", name: "金字塔+騎駱駝", price: 12876, paid: true },
                { id: 12, person: "Luke", name: "阿斯旺抵達接送", price: 770, paid: true }
            ],
            // ... 其餘行程與行李數據與 V5 相同
        };

        let state = JSON.parse(localStorage.getItem('egypt_v6_data')) || defaultData;
        function save() { localStorage.setItem('egypt_v6_data', JSON.stringify(state)); renderFinance(); }

        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.replace('text-[#a53816]', 'text-gray-400'));
            const currentBtn = Array.from(document.querySelectorAll('.nav-item')).find(btn => btn.getAttribute('onclick').includes(id));
            if(currentBtn) currentBtn.classList.replace('text-gray-400', 'text-[#a53816]');
            if(id === 'finance') renderFinance();
        }

        function togglePaid(id) {
            const exp = state.expenses.find(e => e.id === id);
            if(exp) exp.paid = !exp.paid;
            save();
        }

        function addUserExpense() {
            const person = document.getElementById('new-exp-person').value;
            const name = document.getElementById('new-exp-name').value;
            const price = document.getElementById('new-exp-price').value;
            if(name && price) {
                state.expenses.push({ id: Date.now(), person, name, price: parseFloat(price), paid: true });
                document.getElementById('new-exp-name').value = '';
                document.getElementById('new-exp-price').value = '';
                save();
            }
        }

        function renderFinance() {
            let total = 0;
            const memberPaid = { Ting: 0, Luke: 0, Joyce: 0, Soda: 0 };
            
            // 計算總計與個人已付
            state.expenses.forEach(e => {
                if(e.paid) {
                    total += e.price;
                    if(memberPaid.hasOwnProperty(e.person)) memberPaid[e.person] += e.price;
                }
            });

            const avg = total / 4;
            document.getElementById('total-amount').innerText = total.toLocaleString();
            document.getElementById('avg-amount').innerText = Math.round(avg).toLocaleString();

            // 更新個人結算看板
            document.getElementById('member-stats').innerHTML = members.map(m => `
                <div class="card p-3 border-t-2 ${m === 'Ting' || m === 'Luke' ? 'border-blue-400' : 'border-gray-200'}">
                    <div class="text-xs font-bold text-gray-400 uppercase">${m}</div>
                    <div class="text-[10px] text-gray-500 mt-1">已墊付: NT$ ${memberPaid[m].toLocaleString()}</div>
                    <div class="text-[11px] font-bold ${memberPaid[m] >= avg ? 'text-green-600' : 'text-red-500'} mt-1">
                        ${memberPaid[m] >= avg ? '需找回: ' + Math.round(memberPaid[m]-avg).toLocaleString() : '需補交: ' + Math.round(avg-memberPaid[m]).toLocaleString()}
                    </div>
                </div>
            `).join('');

            // 更新支出明細
            document.getElementById('expense-list').innerHTML = state.expenses.map(e => `
                <div onclick="togglePaid(${e.id})" class="card p-4 flex justify-between items-center transition active:scale-[0.98]">
                    <div class="flex items-center gap-3">
                        <i class="fas ${e.paid ? 'fa-check-circle text-green-500' : 'fa-circle text-gray-200'} text-lg"></i>
                        <div>
                            <div class="text-xs font-bold text-[#4b4963] opacity-50">${e.person} 支付</div>
                            <div class="text-sm font-bold ${!e.paid ? 'text-gray-300' : 'text-gray-800'}">${e.name}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-[#a53816] font-mono font-bold text-sm ${!e.paid ? 'opacity-30' : ''}">NT$ ${e.price.toLocaleString()}</div>
                        ${e.paid ? '<span class="paid-badge">已核銷</span>' : ''}
                    </div>
                </div>
            `).reverse().join('');
        }

        renderFinance();
    </script>
</body>
</html>
