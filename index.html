<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>埃及之旅</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="apple-mobile-web-app-title" content="埃及之旅">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#a53816">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --egypt-red: #a53816; --egypt-blue: #4b4963; --egypt-sand: #f4ece1; }
        body { font-family: 'Noto Serif TC', serif; background-color: var(--egypt-sand); -webkit-tap-highlight-color: transparent; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 25px 25px 0 0; }
        .card { border-radius: 20px; background: white; box-shadow: 0 4px 12px rgba(165, 56, 22, 0.06); border: 1px solid rgba(165, 56, 22, 0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .day-badge { flex: 0 0 auto; min-width: 75px; height: 55px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px; background: white; color: var(--egypt-blue); transition: 0.3s; padding: 0 8px; }
        .day-badge.active { background-color: var(--egypt-red); color: white; transform: scale(1.05); }
        .checked { text-decoration: line-through; opacity: 0.4; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .todo-item { border-left: 4px solid #f97316; background-color: #fffaf0; }
    </style>
</head>
<body class="pb-28">

    <header class="p-8 text-center">
        <div class="text-3xl font-bold text-[#a53816] tracking-[0.2em] mb-1">埃及之旅</div>
        <div class="text-sm font-bold text-[#a53816] tracking-[0.4em] uppercase opacity-60">ANCIENT EGYPT</div>
    </header>

    <main class="px-5">
        <section id="itinerary" class="tab-content active">
            <div id="day-selector" class="flex overflow-x-auto gap-3 py-4 no-scrollbar"></div>
            <div id="itinerary-list" class="space-y-4 mt-2"></div>
        </section>

        <section id="packing" class="tab-content">
            <h3 class="font-bold text-[#a53816] mb-5 text-lg"><i class="fas fa-suitcase-rolling mr-2"></i>行李與備品清單</h3>
            <div id="packing-list" class="space-y-6"></div>
        </section>

        <section id="finance" class="tab-content">
            <div class="card p-5 mb-6 bg-[#4b4963] text-white text-center">
                <div class="text-sm opacity-80">本頁保留自動換算與記帳功能</div>
            </div>
            <div id="finance-ui"></div>
            <div id="expense-list" class="space-y-3"></div>
        </section>

        <section id="tips" class="tab-content">
            <div class="card p-6 text-center text-white mb-6" style="background: linear-gradient(135deg, #a53816, #4b4963);">
                <div id="temp" class="text-5xl font-bold mb-2">--°C</div>
                <p class="text-[10px] opacity-60">開羅即時氣溫</p>
            </div>
            <div class="space-y-6">
                <div>
                    <h3 class="font-bold text-[#a53816] mb-3"><i class="fas fa-info-circle mr-2"></i>必備 App 與通訊</h3>
                    <div class="card p-5 text-[11px] space-y-3">
                        <p>📶 <b>網路：</b>建議機場買 Orange 實體卡。🙅 Esim 易斷網。</p>
                        <p>🚕 <b>交通：</b>開羅用 Uber (可刷卡)；全埃及用 inDrive (只叫 4.9⭐ 以上，收現金)。</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 h-20 glass-nav flex justify-around items-center px-4 z-50">
        <button onclick="nav('itinerary')" class="nav-item text-[#a53816] flex flex-col items-center gap-1"><i class="fas fa-calendar-alt text-xl"></i><span class="text-[10px] font-bold">行程</span></button>
        <button onclick="nav('packing')" class="nav-item text-gray-400 flex flex-col items-center gap-1"><i class="fas fa-check-double text-xl"></i><span class="text-[10px] font-bold">行李</span></button>
        <button onclick="nav('finance')" class="nav-item text-gray-400 flex flex-col items-center gap-1"><i class="fas fa-wallet text-xl"></i><span class="text-[10px] font-bold">帳務</span></button>
        <button onclick="nav('tips')" class="nav-item text-gray-400 flex flex-col items-center gap-1"><i class="fas fa-compass text-xl"></i><span class="text-[10px] font-bold">攻略</span></button>
    </nav>

    <script>
        const state = JSON.parse(localStorage.getItem('egypt_v12_final')) || {
            currentDay: "3/27",
            checkedPacking: {},
            expenses: [],
            itinerary: [
                { date: "3/27", d: "D0", events: [{ t: "12:00", loc: "桃園機場T2集合 (換美金)", isTodo: true }]},
                { date: "3/28", d: "D1", events: [
                    { t: "07:30", loc: "抵達開羅 / 換匯入境" },
                    { t: "09:30", loc: "確認隔天早餐時間", isTodo: true },
                    { t: "16:00", loc: "哈利利市集 (殺價大作戰)" },
                    { t: "18:00", loc: "晚餐：Koshary Abou Tarek" },
                    { t: "20:00", loc: "Alfa Market 採買早餐/午餐" },
                    { t: "21:00", loc: "Luke確認明天金字塔團集合時間", isTodo: true }
                ]},
                { date: "3/29", d: "D2", events: [
                    { t: "08:00", loc: "薩卡拉 & 孟菲斯導覽" },
                    { t: "13:00", loc: "吉薩高原騎駱駝" },
                    { t: "19:30", loc: "回飯店確認行李寄放 / Ting確認沙漠團時間", isTodo: true },
                    { t: "20:00", loc: "晚餐：Oldish 餐廳" }
                ]},
                { date: "3/30", d: "D3", events: [{ t: "08:00", loc: "黑白沙漠之旅 (出發)" }, { t: "20:00", loc: "住宿：沙漠帳篷" }]},
                { date: "3/31", d: "D4", events: [
                    { t: "10:00", loc: "搭車回開羅" },
                    { t: "15:00", loc: "洞穴教堂 (視體力決定)" },
                    { t: "17:00", loc: "晚餐：Felfela" },
                    { t: "19:00", loc: "確認接駁 & 阿斯旺接送時間", isTodo: true }
                ]},
                { date: "4/1", d: "D5", events: [
                    { t: "02:45", loc: "集合" }, { t: "03:00", loc: "出發前往機場" },
                    { t: "06:45", loc: "飛機 NP081 往阿斯旺" },
                    { t: "20:00", loc: "Ting確認隔天郵輪接送時間", isTodo: true }
                ]},
                { date: "4/2", d: "D6", events: [{ t: "07:45", loc: "集合" }, { t: "08:00", loc: "出發 (尼羅河郵輪之旅)" }]},
                { date: "4/3", d: "D7", events: [
                    { t: "08:00", loc: "艾得夫 & 路克索神殿" },
                    { t: "18:00", loc: "確認下船地點 (推薦KFC碼頭)", isTodo: true }
                ]},
                { date: "4/4", d: "D8", events: [{ t: "05:00", loc: "熱氣球 / 帝王谷" }, { t: "18:00", loc: "晚餐：Fish House" }]},
                { date: "4/5", d: "D9", events: [
                    { t: "09:50", loc: "集合" },
                    { t: "12:00", loc: "路克索市集" },
                    { t: "15:00", loc: "包車前往路克索飯店" },
                    { t: "19:00", loc: "晚餐：肯德基" },
                    { t: "20:00", loc: "確認明天車輛 / Spire飯店接送", isTodo: true }
                ]},
                { date: "4/6", d: "D10", events: [
                    { t: "05:20", loc: "集合" }, { t: "05:40", loc: "前往阿斯旺機場" },
                    { t: "11:30", loc: "Spire 飯店接送" },
                    { t: "13:00", loc: "大埃及博物館 (GEM)" },
                    { t: "18:00", loc: "晚餐：Hagooga" },
                    { t: "20:00", loc: "確認明天接駁時間", isTodo: true }
                ]},
                { date: "4/7", d: "D11", events: [{ t: "09:40", loc: "集合" }, { t: "10:00", loc: "出發前往開羅機場" }]}
            ]
        };

        const packingList = [
            { cat: "防疫與衛生", items: ["口罩", "酒精/乾洗手", "垃圾袋", "衛生紙", "濕紙巾"] },
            { cat: "生活電器", items: ["延長線", "熱水壺", "濾芯", "轉接頭", "行動電源", "手電筒"] },
            { cat: "飲食備品", items: ["免洗筷", "泡麵", "零食", "保溫瓶"] },
            { cat: "隨身必備", items: ["護照", "美金現金", "Sim卡/卡針", "墨鏡", "防曬/乳液"] },
            { cat: "衣物", items: ["外套", "短袖", "換洗內衣褲", "好走的鞋"] }
        ];

        function save() { localStorage.setItem('egypt_v12_final', JSON.stringify(state)); render(); }
        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.replace('text-[#a53816]', 'text-gray-400'));
            const currentBtn = Array.from(document.querySelectorAll('.nav-item')).find(btn => btn.getAttribute('onclick').includes(id));
            if(currentBtn) currentBtn.classList.replace('text-gray-400', 'text-[#a53816]');
        }

        function render() {
            const daySel = document.getElementById('day-selector');
            daySel.innerHTML = state.itinerary.map(d => `<div onclick="state.currentDay='${d.date}';save();" class="day-badge ${state.currentDay===d.date?'active':''}"> <span class="text-[9px] opacity-60">${d.date}</span><span class="font-bold text-xs">${d.d}</span> </div>`).join('');
            
            const activeDay = state.itinerary.find(d => d.date === state.currentDay);
            document.getElementById('itinerary-list').innerHTML = activeDay.events.map(e => `
                <div class="card p-4 flex gap-4 ${e.isTodo ? 'todo-item' : 'border-l-4 border-[#a53816]'}"> 
                    <div class="text-[#4b4963] font-bold text-xs pt-1">${e.t}</div> 
                    <div class="text-sm text-gray-800 font-bold leading-relaxed">
                        ${e.isTodo ? '<i class="fas fa-exclamation-circle text-orange-500 mr-1"></i>' : ''}${e.loc}
                    </div> 
                </div>`).join('');

            document.getElementById('packing-list').innerHTML = packingList.map(c => `
                <div class="mb-5"><h4 class="text-xs font-bold text-[#a53816] mb-2 opacity-50 uppercase tracking-widest">${c.cat}</h4> 
                <div class="space-y-2">${c.items.map(i => `
                    <div onclick="state.checkedPacking['${i}']=!state.checkedPacking['${i}'];save();" class="card p-3 flex items-center justify-between"> 
                        <span class="${state.checkedPacking[i]?'checked':''} text-sm">${i}</span> 
                        <i class="fa-regular ${state.checkedPacking[i]?'fa-check-circle text-green-500':'fa-circle text-gray-300'}"></i> 
                    </div>`).join('')}</div></div>`).join('');
        }

        render();
    </script>
</body>
</html>
