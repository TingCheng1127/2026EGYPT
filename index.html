<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>埃及探險 V4 | 帳務更新</title>
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22EgyptTripV4%22,%22short_name%22:%22Egypt%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23F5F5F5%22,%22theme_color%22:%22%23a53816%22}">
    <meta name="theme-color" content="#a53816">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%234b4963'/%3E%3Cpath d='M50 25c13.8 0 25 11.2 25 25S63.8 75 50 75 25 63.8 25 50s11.2-25 25-25zm0 8c-9.4 0-17 7.6-17 17s7.6 17 17 17 17-7.6 17-17-7.6-17-17-17zm0 6c6.1 0 11 4.9 11 11s-4.9 11-11 11-11-4.9-11-11 4.9-11 11-11z' fill='%23FFD700'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --egypt-red: #a53816; --egypt-blue: #4b4963; --egypt-sand: #f4ece1; }
        body { font-family: 'Noto Serif TC', serif; background-color: var(--egypt-sand); -webkit-tap-highlight-color: transparent; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 25px 25px 0 0; }
        .card { border-radius: 20px; background: white; box-shadow: 0 4px 12px rgba(165, 56, 22, 0.06); border: 1px solid rgba(165, 56, 22, 0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .day-badge { flex: 0 0 auto; width: 60px; height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px; background: white; color: var(--egypt-blue); transition: 0.3s; }
        .day-badge.active { background-color: var(--egypt-red); color: white; transform: scale(1.1); box-shadow: 0 4px 10px rgba(165, 56, 22, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .checked { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body class="pb-28">

    <header class="p-6 text-center">
        <h1 class="text-2xl font-bold text-[#a53816] tracking-widest uppercase">Ancient Egypt V4</h1>
        <p class="text-[10px] text-[#4b4963] font-bold opacity-70 mt-1">尼羅河冒險：2026 行程更新</p>
    </header>

    <main class="px-5">
        <section id="itinerary" class="tab-content active">
            <div class="flex overflow-x-auto gap-3 py-4 no-scrollbar" id="day-selector"></div>
            <div id="itinerary-list" class="space-y-4 mt-2"></div>
        </section>

        <section id="packing" class="tab-content">
            <h3 class="font-bold text-[#a53816] mb-4 text-lg"><i class="fas fa-suitcase-rolling mr-2"></i>攜帶物品檢查</h3>
            <div id="packing-list" class="space-y-6"></div>
        </section>

        <section id="tips" class="tab-content">
            <div class="card p-6 mb-6 text-center border-b-4 border-[#a53816]">
                <span class="text-xs text-gray-400 uppercase tracking-widest font-bold">已支付總額 (TWD)</span>
                <div class="text-4xl font-bold text-[#a53816] mt-2" id="total-amount">0</div>
            </div>

            <h3 class="font-bold text-[#a53816] mb-4"><i class="fas fa-receipt mr-2"></i>費用清單</h3>
            <div id="expense-list" class="space-y-3">
                </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 h-20 glass-nav flex justify-around items-center px-4 z-50">
        <button onclick="nav('itinerary')" class="nav-item text-[#a53816] flex flex-col items-center gap-1">
            <i class="fas fa-calendar-alt text-xl"></i><span class="text-[10px] font-bold">行程</span>
        </button>
        <button onclick="nav('packing')" class="nav-item text-gray-400 flex flex-col items-center gap-1">
            <i class="fas fa-check-square text-xl"></i><span class="text-[10px] font-bold">行李</span>
        </button>
        <button onclick="nav('tips')" class="nav-item text-gray-400 flex flex-col items-center gap-1">
            <i class="fas fa-wallet text-xl"></i><span class="text-[10px] font-bold">帳務</span>
        </button>
    </nav>

    <script>
        const defaultData = {
            currentDay: "3/27",
            itinerary: [
                { date: "3/27", events: [{ t: "12:30", title: "機場集合", note: "臺灣桃園國際機場 T2" }, { t: "15:00", title: "搭乘東航 MU5008", note: "TPE → 上海浦東 T1" }]},
                { date: "3/28", events: [{ t: "00:50", title: "搭乘東航 MU223", note: "上海浦東 T1 → 開羅 T3" }, { t: "07:30", title: "換匯與落地簽", note: "美金換埃鎊、落地簽 30USD" }, { t: "11:00", title: "阿里清真寺", note: "飯店 Solana Pyramids View" }, { t: "13:00", title: "伊斯蘭藝術博物館", note: "" }, { t: "15:00", title: "洞穴教堂", note: "" }, { t: "17:00", title: "哈利利市集", note: "" }]},
                { date: "3/29", events: [{ t: "09:00", title: "薩卡拉金字塔", note: "08:00 出發" }, { t: "10:00", title: "孟菲斯", note: "" }, { t: "13:00", title: "吉薩駱駝騎乘", note: "" }, { t: "14:30", title: "獅身人面像", note: "" }, { t: "17:00", title: "老城區夜生活", note: "" }]},
                { date: "3/30", events: [{ t: "13:00", title: "巴哈里亞綠洲", note: "" }, { t: "14:30", title: "黑色沙漠", note: "" }, { t: "16:00", title: "白色沙漠之旅", note: "" }, { t: "20:00", title: "住宿：白色沙漠帳篷", note: "" }]},
                { date: "3/31", events: [{ t: "09:00", title: "白色沙漠日出", note: "" }, { t: "10:00", title: "回程開羅", note: "" }]},
                { date: "4/1", events: [{ t: "06:45", title: "飛往阿斯旺 NP081", note: "" }, { t: "11:00", title: "阿斯旺河濱大道", note: "搭風帆船" }, { t: "14:00", title: "努比亞博物館", note: "" }, { t: "18:00", title: "阿斯旺老夜市", note: "" }]},
                { date: "4/2", events: [{ t: "08:00", title: "郵輪之旅", note: "" }, { t: "13:00", title: "費萊神殿", note: "" }, { t: "17:00", title: "住宿：Princess Sarah", note: "" }]},
                { date: "4/3", events: [{ t: "13:00", title: "艾得夫神殿", note: "" }, { t: "15:00", title: "路克索神殿", note: "" }]},
                { date: "4/4", events: [{ t: "05:00", title: "路克索熱氣球", note: "" }, { t: "07:00", title: "帝王谷", note: "" }, { t: "11:30", title: "卡納克神廟", note: "" }]},
                { date: "4/5", events: [{ t: "13:00", title: "抵達阿斯旺住宿", note: "Crystala Guest House" }, { t: "14:30", title: "路克索市集", note: "" }]},
                { date: "4/6", events: [{ t: "09:00", title: "飛往開羅 NP082", note: "" }, { t: "12:00", title: "大埃及博物館", note: "" }]},
                { date: "4/7", events: [{ t: "13:15", title: "搭乘東航 MU224", note: "開羅 T3 → 上海" }]},
                { date: "4/8", events: [{ t: "12:20", title: "搭乘東航 MU5007", note: "上海 → 桃園" }]}
            ],
            packing: [
                { category: "行程文件", items: ["護照", "信用卡", "現金（美金、台幣）", "行程表"] },
                { category: "盥洗用品", items: ["沐浴乳", "洗髮乳", "洗面乳", "卸妝濕紙巾", "乳液", "化妝水", "防曬乳", "化妝棉", "綿花棒", "毛巾", "牙刷", "牙膏"] },
                { category: "衣物", items: ["短袖", "寬褲", "短褲", "內衣", "內褲", "襪子"] },
                { category: "個人衛生", items: ["護唇膏", "凡士林", "乾洗手", "濕紙巾", "衛生紙", "護手霜", "牙套", "日拋隱形眼鏡", "粉底液", "口紅", "遮瑕膏", "眉筆", "眉粉", "雙眼皮貼"] },
                { category: "鞋子、配件", items: ["夾腳拖", "帆布鞋", "防盜包", "隨身小包", "墨鏡", "帽子", "頸枕", "絲巾披肩"] },
                { category: "藥品", items: ["止瀉胃腸藥", "OK蹦", "暈車藥", "感冒藥", "曼秀雷敦", "防蚊液", "止痛藥", "泰國吸鼻"] },
                { category: "電子產品", items: ["手機", "相機", "鏡頭", "底片相機", "底片", "電池", "手機掛繩", "充電器", "記憶卡"] },
                { category: "其他", items: ["筆", "耳塞", "眼罩", "轉接頭", "轉接線", "行動電源", "指甲剪"] }
            ],
            // 根據圖片 更新花費
            expenses: [
                { person: "Ting", name: "台-上-開(來回機票)", price: 80628 },
                { person: "Luke", name: "內陸飛機票", price: 55630 },
                { person: "Ting", name: "埃及sim卡", price: 1017 },
                { person: "Ting", name: "旅平不便險", price: 1664 },
                { person: "Ting", name: "klook-三天兩夜郵輪", price: 96024 },
                { person: "Ting", name: "klook-黑白沙漠", price: 14430 },
                { person: "Ting", name: "pyramisa hotel luxor", price: 6386 },
                { person: "Ting", name: "crystala guest house", price: 3093 },
                { person: "Ting", name: "nebro nubian guest house", price: 5196 },
                { person: "Luke", name: "大埃及博物館 門票", price: 3968 },
                { person: "Luke", name: "金字塔+騎駱駝", price: 12876 },
                { person: "Luke", name: "阿斯旺抵達的接送", price: 770 }
            ],
            checkedItems: {}
        };

        let state = JSON.parse(localStorage.getItem('egypt_trip_v4_updated')) || defaultData;

        function save() { localStorage.setItem('egypt_trip_v4_updated', JSON.stringify(state)); render(); }

        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.replace('text-[#a53816]', 'text-gray-400'));
            event.currentTarget.classList.replace('text-gray-400', 'text-[#a53816]');
        }

        function render() {
            // 行程天數
            const daySelector = document.getElementById('day-selector');
            daySelector.innerHTML = '';
            state.itinerary.forEach(day => {
                const btn = document.createElement('div');
                btn.className = `day-badge ${state.currentDay === day.date ? 'active' : ''}`;
                btn.innerHTML = `<span class="text-[9px] opacity-60">${day.date.split('/')[0]}月</span><span class="font-bold">${day.date.split('/')[1]}日</span>`;
                btn.onclick = () => { state.currentDay = day.date; save(); };
                daySelector.appendChild(btn);
            });

            const activeDay = state.itinerary.find(d => d.date === state.currentDay);
            document.getElementById('itinerary-list').innerHTML = activeDay.events.map(e => `
                <div class="card p-4 flex gap-4 border-l-4 border-[#a53816]">
                    <div class="text-[#4b4963] font-bold text-xs pt-1">${e.t}</div>
                    <div class="flex-1">
                        <div class="font-bold text-gray-800">${e.title}</div>
                        <div class="text-xs text-gray-500 mt-1">${e.note}</div>
                    </div>
                </div>
            `).join('');

            // 行李清單
            const packingContainer = document.getElementById('packing-list');
            packingContainer.innerHTML = state.packing.map(cat => `
                <div class="mb-4">
                    <h4 class="text-xs font-bold text-[#a53816] mb-2 px-1 uppercase tracking-widest opacity-60">${cat.category}</h4>
                    <div class="space-y-2">
                        ${cat.items.map(item => {
                            const isChecked = state.checkedItems[item];
                            return `
                            <div onclick="toggleCheck('${item}')" class="card p-3 flex items-center justify-between">
                                <span class="${isChecked ? 'checked' : ''} text-sm">${item}</span>
                                <i class="fa-regular ${isChecked ? 'fa-check-circle text-green-500' : 'fa-circle text-gray-300'}"></i>
                            </div>`;
                        }).join('')}
                    </div>
                </div>
            `).join('');

            // 帳務清單
            let total = 0;
            document.getElementById('expense-list').innerHTML = state.expenses.map(e => {
                total += e.price;
                return `
                <div class="card p-4 flex justify-between items-center">
                    <div>
                        <div class="text-xs font-bold text-[#4b4963] opacity-50">${e.person} 支付</div>
                        <div class="text-sm font-bold text-gray-800">${e.name}</div>
                    </div>
                    <div class="text-[#a53816] font-mono font-bold text-sm">NT$ ${e.price.toLocaleString()}</div>
                </div>`;
            }).join('');
            document.getElementById('total-amount').innerText = total.toLocaleString();
        }

        function toggleCheck(item) { state.checkedItems[item] = !state.checkedItems[item]; save(); }

        render();
    </script>
</body>
</html>
